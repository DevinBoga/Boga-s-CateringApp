<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Catering Liste" />
  <title>Catering Vorbereitungsliste</title>
  <style>
    :root{--bg:#f6f7f9;--card:#fff;--text:#111827;--muted:#6b7280;--line:#d8dee7;--green:#166534;--green2:#dcfce7;--blue:#1d4ed8;--danger:#991b1b;--shadow:0 12px 32px rgba(15,23,42,.10);--radius:24px}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}body{padding:calc(env(safe-area-inset-top) + 18px) 18px calc(env(safe-area-inset-bottom) + 18px)}.app{max-width:760px;margin:0 auto}.top{padding:8px 0 18px}.title{font-size:34px;line-height:1.04;font-weight:900;margin:0}.sub{font-size:17px;color:var(--muted);margin:10px 0 0}.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin:18px 0}.bar{height:100%;background:var(--green);width:0%;transition:.25s}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}.step-title{font-size:25px;margin:0 0 6px;font-weight:850}.hint{color:var(--muted);margin:0 0 18px;line-height:1.35}.field{margin:16px 0}.field label{display:block;font-weight:750;margin-bottom:8px;font-size:16px}input{width:100%;font-size:22px;padding:16px;border:2px solid var(--line);border-radius:18px;background:#fff;color:var(--text);-webkit-appearance:none;appearance:none}input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 4px rgba(22,101,52,.12)}.people{display:grid;grid-template-columns:64px 1fr 64px;gap:10px;align-items:center}.round{height:60px;border-radius:18px;border:0;background:#e5e7eb;font-size:34px;font-weight:900;color:#111827}.people input{text-align:center}.grid{display:grid;grid-template-columns:1fr;gap:12px}.choice{border:2px solid var(--line);background:#fff;border-radius:20px;padding:18px;text-align:left;font-size:20px;font-weight:850;color:var(--text);min-height:72px}.choice .small{display:block;font-size:14px;font-weight:600;color:var(--muted);margin-top:5px}.choice.active{border-color:var(--green);background:var(--green2);color:#064e3b}.selected-count{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:7px 12px;font-weight:800;margin:0 0 14px}.nav{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}.btn{min-height:58px;border:0;border-radius:18px;font-size:18px;font-weight:850;padding:14px 16px}.btn.primary{background:var(--green);color:white}.btn.secondary{background:#e5e7eb;color:#111827}.btn.full{width:100%;margin-top:10px}.btn.blue{background:var(--blue);color:white}.btn.danger{background:#fee2e2;color:var(--danger)}.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}.pill{background:#f3f4f6;border-radius:16px;padding:12px}.pill b{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:white}table{width:100%;border-collapse:collapse;font-size:15px}th,td{padding:12px;border-bottom:1px solid #e5e7eb;text-align:left;vertical-align:top}th{font-size:13px;text-transform:uppercase;letter-spacing:.04em;background:#f9fafb;color:#4b5563}td.num{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}.empty{padding:20px;color:var(--muted);text-align:center}.error{display:none;margin-top:10px;color:#991b1b;font-weight:750}.show{display:block}.footer-note{font-size:13px;color:var(--muted);line-height:1.35;margin-top:14px}@media(min-width:640px){.grid{grid-template-columns:1fr 1fr}.title{font-size:42px}}
  </style>
</head>
<body>
  <main class="app">
    <section class="top">
      <h1 class="title">Catering Vorbereitungsliste</h1>
      <p class="sub">Datenerfassung → Buffetauswahl → Excel für die Küche</p>
      <div class="progress"><div class="bar" id="bar"></div></div>
    </section>
    <section class="card" id="screen"></section>
  </main>
<script>
(function(){
'use strict';
const categories = [
 {key:'salate', title:'Salate & Co.', hint:'Wähle die Salate und Komponenten aus.', items:[
  {id:'salatkomponenten', name:'Salat Komponenten', type:'components', components:[['Gurken',25,'g'],['Kirschtomaten',25,'g'],['Paprika',25,'g'],['Mais',10,'g'],['Zwiebeln',10,'g'],['Wildkräutersalat',10,'g']]},
  {id:'gurkensalat', name:'Gurkensalat', type:'byCount', categoryCount:'salate', rules:{1:100,2:60,3:40}, unit:'g'},
  {id:'moehrensalat', name:'Möhrensalat', type:'byCount', categoryCount:'salate', rules:{1:80,2:40,3:40}, unit:'g'}
 ]},
 {key:'fleisch', title:'Fleisch', hint:'Die Grammzahl richtet sich nach der Anzahl der gewählten Fleischsorten.', items:[
  {id:'nackensteak', name:'Nackensteak', type:'byCount', categoryCount:'fleisch', rules:{1:360,2:180,3:120,4:90,5:60}, unit:'g'},
  {id:'haehnchenspiesse', name:'Hähnchenspieße in Kräuterbutter Marinade', type:'byCount', categoryCount:'fleisch', rules:{1:360,2:180,3:120,4:90,5:60}, unit:'g'},
  {id:'bratwurst', name:'Bratwurst', type:'byCount', categoryCount:'fleisch', rules:{1:350,2:180,3:100,4:70,5:60}, unit:'g'}
 ]},
 {key:'beilagen', title:'Beilagen', hint:'Die Menge richtet sich nach der Anzahl der gewählten Beilagen.', items:[
  {id:'pommes', name:'Pommes', type:'byCount', categoryCount:'beilagen', rules:{1:300,2:150,3:100}, unit:'g'},
  {id:'kroketten', name:'Kroketten', type:'byCount', categoryCount:'beilagen', rules:{1:300,2:150,3:100}, unit:'g'}
 ]},
 {key:'dessert', title:'Dessert', hint:'Desserts werden als Portionen berechnet.', items:[
  {id:'panna-cotta', name:'Panna Cotta', type:'byCount', categoryCount:'dessert', rules:{1:1.1,2:0.55,3:0.35}, unit:'Portionen'}
 ]}
];
const state = {step:0, customer:'', people:10, date:'', time:'', selected:{salate:{},fleisch:{},beilagen:{},dessert:{}}};
const screen = document.getElementById('screen');
const bar = document.getElementById('bar');
function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function count(key){return Object.values(state.selected[key]||{}).filter(Boolean).length;}
function selectedItems(key){const cat=categories.find(c=>c.key===key); return cat.items.filter(i=>state.selected[key][i.id]);}
function maxRule(rules,n){if(rules[n]!==undefined)return rules[n]; const keys=Object.keys(rules).map(Number).sort((a,b)=>a-b); return rules[keys[keys.length-1]];}
function formatQty(q,unit){ if(unit==='Portionen') return (Math.ceil(q*100)/100).toLocaleString('de-DE',{maximumFractionDigits:2})+' Portionen'; if(q>=1000) return (q/1000).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' kg'; return Math.round(q).toLocaleString('de-DE')+' g';}
function rows(){ const p=Number(state.people)||0; const out=[]; categories.forEach(cat=>{ selectedItems(cat.key).forEach(item=>{ if(item.type==='components'){ item.components.forEach(c=>out.push({category:cat.title,item:c[0],per:c[1],unit:c[2],total:p*c[1],display:formatQty(p*c[1],c[2]),note:'aus Salat Komponenten'})); } else { const c=count(item.categoryCount); const per=maxRule(item.rules,c); const total=p*per; out.push({category:cat.title,item:item.name,per:per,unit:item.unit,total:total,display:formatQty(total,item.unit),note:c+' ausgewählt in '+cat.title}); } }); }); return out; }
function setStep(n){state.step=Math.max(0,Math.min(5,n)); render(); window.scrollTo({top:0,behavior:'smooth'});}
function render(){ bar.style.width = ((state.step+1)/6*100)+'%'; if(state.step===0) renderDetails(); else if(state.step>=1 && state.step<=4) renderCategory(categories[state.step-1]); else renderResult(); }
function renderDetails(){ screen.innerHTML = `<h2 class="step-title">1. Kundendaten</h2><p class="hint">Trage die Basisdaten ein. Danach geht es mit der Buffet-Auswahl weiter.</p><div class="field"><label for="customer">Name des Kunden</label><input id="customer" type="text" autocomplete="name" placeholder="z. B. Müller GmbH" value="${esc(state.customer)}"></div><div class="field"><label for="people">Personenzahl</label><div class="people"><button class="round" id="minus" type="button">−</button><input id="people" type="number" min="1" step="1" inputmode="numeric" value="${esc(state.people)}"><button class="round" id="plus" type="button">+</button></div></div><div class="field"><label for="date">Datum des Caterings</label><input id="date" type="date" value="${esc(state.date)}"></div><div class="field"><label for="time">Uhrzeit des Essens</label><input id="time" type="time" value="${esc(state.time)}"></div><div class="error" id="error">Bitte mindestens Kundenname und Personenzahl eintragen.</div><div class="nav"><button class="btn secondary" type="button" disabled>Zurück</button><button class="btn primary" id="next" type="button">Weiter</button></div>`;
 bindDetails(); }
function bindDetails(){ const customer=document.getElementById('customer'), people=document.getElementById('people'), date=document.getElementById('date'), time=document.getElementById('time'); customer.focus(); customer.addEventListener('input',e=>state.customer=e.target.value); people.addEventListener('input',e=>state.people=Math.max(1,parseInt(e.target.value||'1',10))); date.addEventListener('input',e=>state.date=e.target.value); time.addEventListener('input',e=>state.time=e.target.value); document.getElementById('minus').onclick=()=>{state.people=Math.max(1,(Number(state.people)||1)-1); people.value=state.people}; document.getElementById('plus').onclick=()=>{state.people=(Number(state.people)||0)+1; people.value=state.people}; document.getElementById('next').onclick=()=>{state.customer=customer.value.trim(); state.people=Math.max(1,parseInt(people.value||'1',10)); state.date=date.value; state.time=time.value; if(!state.customer||!state.people){document.getElementById('error').classList.add('show');return;} setStep(1);}; }
function renderCategory(cat){ const c=count(cat.key); screen.innerHTML = `<h2 class="step-title">${state.step+1}. ${esc(cat.title)}</h2><p class="hint">${esc(cat.hint)}</p><div class="selected-count">${c} ausgewählt</div><div class="grid">${cat.items.map(item=>`<button type="button" class="choice ${state.selected[cat.key][item.id]?'active':''}" data-id="${esc(item.id)}">${esc(item.name)}<span class="small">Antippen zum Auswählen</span></button>`).join('')}</div><div class="nav"><button class="btn secondary" id="back" type="button">Zurück</button><button class="btn primary" id="next" type="button">Weiter</button></div>`;
 screen.querySelectorAll('.choice').forEach(btn=>btn.onclick=()=>{ const id=btn.dataset.id; state.selected[cat.key][id]=!state.selected[cat.key][id]; renderCategory(cat); }); document.getElementById('back').onclick=()=>setStep(state.step-1); document.getElementById('next').onclick=()=>setStep(state.step+1); }
function renderResult(){ const r=rows(); screen.innerHTML = `<h2 class="step-title">6. Küchenliste</h2><p class="hint">Prüfe die Mengen und exportiere die Liste für Excel.</p><div class="summary"><div class="pill"><b>Kunde</b>${esc(state.customer)||'—'}</div><div class="pill"><b>Personen</b>${Number(state.people)||0}</div><div class="pill"><b>Datum</b>${esc(state.date)||'—'}</div><div class="pill"><b>Essenszeit</b>${esc(state.time)||'—'}</div></div>${r.length?`<div class="table-wrap"><table><thead><tr><th>Kategorie</th><th>Artikel</th><th>pro Person</th><th>Gesamt</th><th>Hinweis</th></tr></thead><tbody>${r.map(x=>`<tr><td>${esc(x.category)}</td><td>${esc(x.item)}</td><td class="num">${String(x.per).replace('.',',')} ${esc(x.unit)}</td><td class="num"><b>${esc(x.display)}</b></td><td>${esc(x.note)}</td></tr>`).join('')}</tbody></table></div>`:`<div class="empty">Noch keine Artikel ausgewählt.</div>`}<button class="btn blue full" id="xlsx" type="button">Excel-Datei speichern (.xlsx)</button><button class="btn secondary full" id="csv" type="button">CSV speichern</button><button class="btn danger full" id="reset" type="button">Neue Liste starten</button><div class="nav"><button class="btn secondary" id="back" type="button">Zurück</button><button class="btn primary" id="print" type="button">Drucken / PDF</button></div><p class="footer-note">Tipp: Auf dem iPhone kannst du die Seite über „Teilen“ → „Zum Home-Bildschirm“ als App speichern.</p>`;
 document.getElementById('back').onclick=()=>setStep(4); document.getElementById('print').onclick=()=>window.print(); document.getElementById('csv').onclick=downloadCsv; document.getElementById('xlsx').onclick=downloadXlsx; document.getElementById('reset').onclick=()=>{ if(confirm('Neue Liste starten?')){ state.step=0; state.customer=''; state.people=10; state.date=''; state.time=''; state.selected={salate:{},fleisch:{},beilagen:{},dessert:{}}; render(); }}; }
function tableData(){ const data=[['Kunde',state.customer],['Personen',state.people],['Datum',state.date],['Essenszeit',state.time],[],['Kategorie','Artikel','pro Person','Einheit','Gesamt roh','Gesamt Anzeige','Hinweis']]; rows().forEach(x=>data.push([x.category,x.item,x.per,x.unit,x.total,x.display,x.note])); return data; }
function downloadCsv(){ const csv=tableData().map(row=>row.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(';')).join('\n'); downloadBlob(csv,'text/csv;charset=utf-8','Kuechenliste_'+safeName()+'.csv'); }
function safeName(){return (state.customer||'Catering').replace(/[^a-z0-9äöüß_-]+/gi,'_');}
function downloadBlob(content,type,name){ const blob=content instanceof Blob?content:new Blob([content],{type}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(url); a.remove();},1000); }
// Minimal XLSX writer: no compression ZIP with shared inline strings
function crc32(str){ let table=crc32.table||(crc32.table=(()=>{let c,t=[];for(let n=0;n<256;n++){c=n;for(let k=0;k<8;k++)c=((c&1)?(0xedb88320^(c>>>1)):(c>>>1));t[n]=c>>>0;}return t;})()); let crc=0^(-1); for(let i=0;i<str.length;i++) crc=(crc>>>8)^table[(crc^str.charCodeAt(i))&0xff]; return (crc^(-1))>>>0; }
function u16(n){return String.fromCharCode(n&255,(n>>>8)&255)} function u32(n){return String.fromCharCode(n&255,(n>>>8)&255,(n>>>16)&255,(n>>>24)&255)}
function zip(files){ let local='',central='',offset=0; files.forEach(f=>{ const name=f.name, data=f.data, crc=crc32(data), size=data.length; const head='PK\x03\x04'+u16(20)+u16(0)+u16(0)+u16(0)+u16(0)+u32(crc)+u32(size)+u32(size)+u16(name.length)+u16(0)+name; local+=head+data; central+='PK\x01\x02'+u16(20)+u16(20)+u16(0)+u16(0)+u16(0)+u16(0)+u32(crc)+u32(size)+u32(size)+u16(name.length)+u16(0)+u16(0)+u16(0)+u16(0)+u32(0)+u32(offset)+name; offset+=head.length+size; }); return local+central+'PK\x05\x06'+u16(0)+u16(0)+u16(files.length)+u16(files.length)+u32(central.length)+u32(local.length)+u16(0); }
function cellRef(r,c){let s=''; c++; while(c){let m=(c-1)%26; s=String.fromCharCode(65+m)+s; c=Math.floor((c-1)/26);} return s+r;}
function xmlEsc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&apos;','"':'&quot;'}[c]));}
function sheetXml(data){ return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>${data.map((row,ri)=>`<row r="${ri+1}">${row.map((v,ci)=>{const ref=cellRef(ri+1,ci); if(v===''||v===undefined)return ''; if(typeof v==='number')return `<c r="${ref}"><v>${v}</v></c>`; return `<c r="${ref}" t="inlineStr"><is><t>${xmlEsc(v)}</t></is></c>`;}).join('')}</row>`).join('')}</sheetData></worksheet>`; }
function downloadXlsx(){ const data=tableData(); const files=[{name:'[Content_Types].xml',data:'<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>'},{name:'_rels/.rels',data:'<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>'},{name:'xl/workbook.xml',data:'<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Kuechenliste" sheetId="1" r:id="rId1"/></sheets></workbook>'},{name:'xl/_rels/workbook.xml.rels',data:'<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>'},{name:'xl/worksheets/sheet1.xml',data:sheetXml(data)}]; const x=zip(files); const bytes=new Uint8Array(x.length); for(let i=0;i<x.length;i++)bytes[i]=x.charCodeAt(i)&255; downloadBlob(new Blob([bytes],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet','Kuechenliste_'+safeName()+'.xlsx'); }
render();
})();
</script>
</body>
</html>
